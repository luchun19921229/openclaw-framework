<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voice Chat — OpenClaw</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --border: #1e1e2e;
    --text: #e2e2ef;
    --text-dim: #6c6c8a;
    --accent: #7c6aef;
    --accent-glow: rgba(124,106,239,0.3);
    --danger: #ef4444;
    --danger-glow: rgba(239,68,68,0.35);
    --success: #22c55e;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .container {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--accent); }

  .chat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    height: 45vh;
    min-height: 240px;
    max-height: 460px;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 85%;
    padding: 0.6rem 0.85rem;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.55;
    word-break: break-word;
    animation: fadeUp .2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.sys {
    align-self: center;
    background: none;
    color: var(--text-dim);
    font-size: 0.78rem;
    padding: 0.2rem;
  }

  .status {
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-dim);
    min-height: 1.1em;
    transition: color .2s;
  }
  .status.on  { color: var(--danger); }
  .status.ok  { color: var(--success); }

  .btn-wrap { display: flex; justify-content: center; }

  .mic {
    width: 76px; height: 76px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--surface);
    color: var(--accent);
    font-size: 1.7rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s ease;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    position: relative;
  }
  .mic:hover { background: var(--accent-glow); }
  .mic.rec {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
    box-shadow: 0 0 28px var(--danger-glow);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  .mic.thinking {
    border-color: var(--success);
    color: var(--success);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hint {
    text-align: center;
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  .opts {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.65rem 0.9rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }
  .opts label {
    font-size: 0.78rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex: 1;
    min-width: 120px;
  }
  .opts select, .opts input[type=range] {
    flex: 1;
    min-width: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 0.25rem 0.4rem;
    font-size: 0.78rem;
  }
</style>
</head>
<body>

<div class="container">
  <h1>🎙️ <span>OpenClaw</span> Voice Chat</h1>

  <div class="chat" id="chat">
    <div class="msg sys">点击麦克风开始录音，再次点击停止</div>
  </div>

  <div class="status" id="status">就绪</div>

  <div class="btn-wrap">
    <button class="mic" id="mic" aria-label="语音对话">🎤</button>
  </div>
  <div class="hint">点击录音 · 空格键按住说话 · 自动语音回复</div>

  <div class="opts">
    <label>模型
      <select id="model">
        <option value="qwen2.5:3b">qwen2.5:3b</option>
        <option value="qwen2.5:7b">qwen2.5:7b</option>
        <option value="llama3.2:3b">llama3.2:3b</option>
        <option value="llama3.1:8b">llama3.1:8b</option>
        <option value="deepseek-r1:7b">deepseek-r1:7b</option>
      </select>
    </label>
    <label>语速
      <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
    </label>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const chat = $('#chat'), stEl = $('#status'), micBtn = $('#mic');

/* ── state ── */
let rec = null, recording = false;

/* ── helpers ── */
function setStatus(t, c = '') { stEl.textContent = t; stEl.className = 'status ' + c; }
function addMsg(t, role) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = t;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

/* ── speech recognition ── */
function initRec() {
  if (rec) return rec;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { addMsg('浏览器不支持语音识别，请用 Chrome / Edge。', 'sys'); return null; }
  rec = new SR();
  rec.lang = 'zh-CN';
  rec.continuous = false;
  rec.interimResults = true;
  return rec;
}

function startRec() {
  const r = initRec();
  if (!r || recording) return;
  recording = true;
  micBtn.classList.add('rec');
  micBtn.textContent = '⏹';
  setStatus('正在听…', 'on');

  let final = '';
  r.onresult = e => {
    let tmp = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else tmp += e.results[i][0].transcript;
    }
    setStatus(final || tmp || '正在听…', 'on');
  };
  r.onend = () => {
    recording = false;
    micBtn.classList.remove('rec');
    micBtn.textContent = '🎤';
    if (final.trim()) {
      addMsg(final.trim(), 'user');
      askOllama(final.trim());
    } else {
      setStatus('没有检测到语音');
    }
  };
  r.onerror = e => {
    recording = false;
    micBtn.classList.remove('rec');
    micBtn.textContent = '🎤';
    if (e.error !== 'aborted') setStatus('识别出错: ' + e.error);
  };
  try { r.start(); } catch {}
}

function stopRec() {
  if (!rec || !recording) return;
  try { rec.stop(); } catch {}
}

/* ── ollama ── */
async function askOllama(text) {
  setStatus('思考中…');
  micBtn.classList.add('thinking');
  const model = $('#model').value;
  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, message: text })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const reply = d.response || d.message || '（无回复）';
    addMsg(reply, 'bot');
    micBtn.classList.remove('thinking');
    setStatus('播放中…', 'ok');
    speak(reply);
  } catch (err) {
    micBtn.classList.remove('thinking');
    addMsg('连接失败: ' + err.message, 'sys');
    setStatus('连接出错');
  }
}

/* ── speech synthesis ── */
function speak(t) {
  if (!window.speechSynthesis) { setStatus('就绪'); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(t);
  u.lang = 'zh-CN';
  u.rate = parseFloat($('#rate').value);
  u.onend = u.onerror = () => setStatus('就绪');
  speechSynthesis.speak(u);
}

/* ── interaction ── */

// Click toggle (works on all platforms)
micBtn.addEventListener('click', e => {
  e.preventDefault();
  if (recording) stopRec();
  else startRec();
});

// Spacebar push-to-talk (hold)
let spaceActive = false;
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !spaceActive && !e.repeat && e.target === document.body) {
    e.preventDefault();
    spaceActive = true;
    startRec();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    spaceActive = false;
    stopRec();
  }
});
</script>
</body>
</html>
